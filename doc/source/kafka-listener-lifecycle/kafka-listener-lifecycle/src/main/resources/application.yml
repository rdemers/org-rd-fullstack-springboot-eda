spring:
  application:
    name: kafka-listener-lifecycle
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  topic: orders
  group: orders-group
  listener:
    # autoStartup=false means the controller decides when to start.
    auto-start: false
    # Defensive reconcile tick; can be lowered in tests.
    reconcile-interval: 10000

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, downstream
          show-details: always
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

logging:
  level:
    com.example.kafkalifecycle: INFO
    org.springframework.kafka.listener: INFO
